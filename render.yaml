services:
  # Backend FastAPI Service
  - type: web
    name: devtool-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devtool-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LLM_PROVIDER
        value: gemini
      - key: LLM_MODEL
        value: gemini-1.5-flash
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: GOOGLE_API_KEY
        sync: false  # Set this in the Render dashboard → Environment tab

  # Frontend Next.js Service
  - type: web
    name: devtool-frontend
    runtime: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromRoute:
          type: web
          name: devtool-backend
          property: url

databases:
  - name: devtool-db
    plan: free
