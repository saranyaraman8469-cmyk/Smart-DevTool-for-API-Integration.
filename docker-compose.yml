version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devtool-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///app/data/devtool.db
      - ENVIRONMENT=production
      - SECRET_KEY=production_secret_key_change_me_in_production
      # - GOOGLE_API_KEY=your_gemini_api_key
      # - OPENAI_API_KEY=your_openai_api_key
    restart: always
    networks:
      - devtool-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devtool-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: always
    networks:
      - devtool-network

volumes:
  backend-data:

networks:
  devtool-network:
    driver: bridge
